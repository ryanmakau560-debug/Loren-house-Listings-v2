<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col">


<header class="backdrop-blur-md bg-white/10 border-b border-white/20 fixed w-full top-0 z-50">
<div class="flex items-center justify-between px-10 py-4">

<div class="flex items-center space-x-3">
<img src="img\Black Lines House Real Estate Logo.jpg" class="h-14 w-auto">
<h1 class="text-3xl font-bold">Loren House Listings</h1>
</div>


<div class="space-x-4">
<a href="index.html" class="border border-white text-white px-5 py-2 rounded hover:bg-white hover:text-black transition duration-300">
Home
</a>

<a href="listings.html" class="border border-white text-white px-5 py-2 rounded hover:bg-white hover:text-black transition duration-300">
View Listings
</a>

<a href="contact us.html" class="border border-white text-white px-5 py-2 rounded bg-transparent text-black transition duration-300">
Contact Us
</a>
</div>

</div>
</header>


<main class="flex-grow flex items-center justify-center px-6 pt-40 pb-20">

<div class="w-full max-w-2xl backdrop-blur-md bg-white/10 p-10 rounded-lg border border-white/20 shadow-lg">

<h2 class="text-3xl font-bold mb-6 text-center">Contact Us</h2>

<form class="space-y-6">

<div>
<label class="block mb-2">Full Name</label>
<input type="text" class="w-full p-3 rounded bg-black/40 border border-white/30 focus:outline-none focus:ring-2 focus:ring-white">
</div>

<div>
<label class="block mb-2">Email Address</label>
<input type="email" class="w-full p-3 rounded bg-black/40 border border-white/30 focus:outline-none focus:ring-2 focus:ring-white">
</div>

<div>
<label class="block mb-2">Message</label>
<textarea rows="5" class="w-full p-3 rounded bg-black/40 border border-white/30 focus:outline-none focus:ring-2 focus:ring-white"></textarea>
</div>

<button type="submit" class="w-full border border-white px-5 py-3 rounded hover:bg-white hover:text-black transition duration-300">
Send Message
</button>

</form>

</div>

</main>

<footer class="backdrop-blur-md bg-white/10 border-t border-white/20 py-6 text-center">
<p class="text-sm">
© 2026 Loren House Listings. All Rights Reserved.
</p>
<p class="text-sm mt-2">
Email: contact@Loren-house-listings.com | Phone: +254 700 000000
</p>
</footer>

</body>
</html>
